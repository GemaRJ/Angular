<div class="container mt-4">
  <h2 class="text-center mb-4">Listado de libros</h2>

  <div class="row g-4">
    @for (item of lista; track $index) {
      <div class="col-12 col-md-6 col-lg-4">
        <app-libro [datos]="item"></app-libro>
      </div>
    } @empty {
      <div class="text-center">Cargando datos de la API...</div>
    }
  </div>
</div>
